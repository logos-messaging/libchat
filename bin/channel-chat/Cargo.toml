[package]
name = "channel-chat"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "channel-chat"
path = "src/main.rs"

[dependencies]
# Workspace dependencies (sorted)
base64 = { workspace = true }
waku-bindings = { workspace = true }

# External dependencies (sorted)
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
crossterm = "0.29"
ratatui = "0.29"
serde = { version = "1.0", features = ["derive"] }
serde_json = "1.0"
tokio = { version = "1", features = ["full"] }
