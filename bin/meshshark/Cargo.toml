[package]
name = "meshshark"
version = "0.1.0"
edition = "2024"

[[bin]]
name = "meshshark"
path = "src/main.rs"

[dependencies]
# Workspace dependencies (sorted)
logos-delivery = { path = "../../extensions/logos-delivery-rust"}

# External dependencies (sorted)
anyhow = "1.0"
clap = { version = "4", features = ["derive"] }
crossbeam-channel = { workspace = true }
crossterm = "0.29"
libc = "0.2"
ratatui = "0.29"
tracing = "0.1.44"
tracing-subscriber = "0.3"