
[workspace]
resolver = "3"

members = [
    "libchat/conversations",
    "libchat/crypto",
    "libchat/double-ratchets",
    "libchat/storage",
]

[workspace.dependencies]
blake2 = "0.10"
storage = { path = "libchat/storage" }

# Panicking across FFI boundaries is UB; abort is the correct strategy for a
# C FFI library.
[profile.release]
panic = "abort"
