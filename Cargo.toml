
[workspace]
resolver = "3"

members = [
    "core/sqlite",
    "core/conversations",
    "core/crypto",
    "core/double-ratchets",
    "core/storage",
    "crates/client",
    "crates/client-ffi",
    "bin/chat-cli",
]

[workspace.dependencies]
blake2 = "0.10"
libchat = { path = "core/conversations" }
storage = { path = "core/storage" }

# Panicking across FFI boundaries is UB; abort is the correct strategy for a
# C FFI library.
[profile.release]
panic = "abort"
